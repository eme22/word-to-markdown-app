<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Bulk Convert - Word to Markdown</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script type="module" src="/src/bulk.ts"></script>
    <style>
      #drop-area {
        border: 2px dashed #ccc;
        border-radius: 10px;
        padding: 40px;
        text-align: center;
        background: #f8f9fa;
        cursor: pointer;
        transition: background 0.3s ease;
      }
      #drop-area.active {
        background: #e9ecef;
        border-color: #0d6efd;
      }
      #file-list {
        max-height: 250px;
        overflow-y: auto;
      }
      .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid #dee2e6;
      }
      .file-item:last-child {
        border-bottom: none;
      }
      .status-pending { color: #6c757d; }
      .status-processing { color: #0d6efd; }
      .status-success { color: #198754; }
      .status-error { color: #dc3545; }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h2 class="text-center mb-4">Bulk Convert</h2>
      
      <div id="drop-area" class="mb-4">
        <h4>Drag & Drop .docx files here</h4>
        <p class="text-muted">or click to select files manually</p>
      </div>

      <div class="card mb-4 d-none" id="file-list-card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>Selected Files</span>
          <span class="badge bg-primary" id="file-count">0</span>
        </div>
        <div class="card-body p-0">
          <div id="file-list"></div>
        </div>
      </div>

      <div class="text-center">
        <button id="start-btn" class="btn btn-primary btn-lg d-none">Start Bulk Conversion</button>
        <button id="clear-btn" class="btn btn-outline-secondary btn-lg d-none">Clear All</button>
      </div>

      <div id="progress-section" class="mt-4 d-none">
        <div class="progress mb-2">
          <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
        </div>
        <p id="progress-text" class="text-center text-muted small"></p>
      </div>

      <div id="alert-container" class="mt-3"></div>
    </div>
  </body>
</html>
